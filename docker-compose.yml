services:
  cyphersheet:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cyphersheet-pwa
    ports:
      - "5041:80"
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/CypherSheet/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 64M
        reservations:
          memory: 16M
