<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>CypherSheet</title>
    <script>
        // GitHub Pages SPA redirect trick
        // Encodes the full path as a query string and redirects to index.html
        // so Blazor can handle the routing client-side.
        var segmentCount = 1; // number of path segments in the base href (e.g. /CypherSheet/ = 1)
        var location = window.location;
        var path = location.pathname.slice(1).split('/').slice(segmentCount).join('/');
        var query = location.search.slice(1);
        var hash = location.hash.slice(1);

        var redirectUrl = location.protocol + '//' + location.hostname +
            (location.port ? ':' + location.port : '') +
            '/' + location.pathname.slice(1).split('/').slice(0, segmentCount).join('/') + '/?p=/' + path +
            (query ? '&q=' + query : '') +
            (hash ? '&h=' + hash : '');

        location.replace(redirectUrl);
    </script>
</head>
<body>
    Redirecting...
</body>
</html>
